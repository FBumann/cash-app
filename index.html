<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Kasse">
<title>Vereinskasse</title>
<style>
  :root {
    --bg: #f5f5f5;
    --surface: #ffffff;
    --surface-2: #e9e9eb;
    --border: #d1d1d6;
    --text: #1c1c1e;
    --muted: #6e6e73;
    --accent: #0071e3;
    --accent-press: #0062c4;
    --success: #28a745;
    --danger: #dc3545;
    --warning: #f59e0b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro", system-ui, sans-serif;
    font-size: 16px; overscroll-behavior: none;
    -webkit-user-select: none; user-select: none;
  }
  input { -webkit-user-select: text; user-select: text; }
  button { font-family: inherit; color: inherit; cursor: pointer; }

  #app {
    display: flex; flex-direction: column;
    height: 100vh; height: 100dvh;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* Tab bar */
  nav.tabs {
    display: flex; background: var(--surface);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  nav.tabs button {
    flex: 1; background: none; border: none;
    padding: 14px 8px; font-size: 15px; color: var(--muted);
    border-bottom: 3px solid transparent;
    min-height: 56px;
  }
  nav.tabs button.active {
    color: var(--text); border-bottom-color: var(--accent);
  }

  main { flex: 1; overflow: hidden; position: relative; }
  .screen {
    position: absolute; inset: 0;
    display: none; flex-direction: column;
    overflow: hidden;
  }
  .screen.active { display: flex; }

  /* Register */
  #register {
    flex-direction: column;
  }
  @media (min-width: 768px) {
    #register { flex-direction: row; }
  }
  .menu-grid {
    flex: 1; overflow-y: auto; padding: 12px;
    display: grid; gap: 10px;
    grid-template-columns: repeat(2, 1fr);
    align-content: start;
    min-height: 0;
    -webkit-overflow-scrolling: touch;
  }
  @media (min-width: 768px) {
    .menu-grid { grid-template-columns: repeat(3, 1fr); }
  }
  .menu-item {
    background: var(--menu-bg, var(--surface-2));
    color: var(--menu-fg, var(--text));
    border: 1px solid var(--border);
    border-radius: 12px; padding: 16px 10px;
    min-height: 88px;
    display: flex; flex-direction: column; justify-content: center;
    align-items: center; gap: 6px; text-align: center;
  }
  .menu-item:active {
    background: var(--accent); color: white; border-color: var(--accent);
  }
  .menu-item .name { font-size: 17px; font-weight: 600; }
  .menu-item .price { font-size: 15px; color: inherit; opacity: 0.75; }
  .menu-item--custom {
    background: transparent;
    color: var(--accent);
    border: 2px dashed var(--accent);
  }
  .menu-item--custom:active {
    background: var(--accent); color: white;
  }
  .menu-empty {
    grid-column: 1 / -1; text-align: center;
    color: var(--muted); padding: 40px 20px;
  }

  /* Cart */
  .cart {
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column;
    max-height: 50vh;
    overflow: hidden;
  }
  @media (min-width: 768px) {
    .cart {
      border-top: none; border-left: 1px solid var(--border);
      width: 360px; max-height: none;
    }
  }
  .cart-items {
    flex: 1; overflow-y: auto; padding: 8px 12px;
    min-height: 0;
    -webkit-overflow-scrolling: touch;
  }
  .cart-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .cart-item:last-child { border-bottom: none; }
  .cart-item .info { flex: 1; min-width: 0; }
  .cart-item .name { font-size: 16px; font-weight: 500; }
  .cart-item .line { font-size: 13px; color: var(--muted); }
  .qty {
    display: flex; align-items: center; gap: 4px;
  }
  .qty button {
    width: 36px; height: 36px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 8px; font-size: 20px; font-weight: 600;
    display: flex; align-items: center; justify-content: center;
  }
  .qty button:active { background: var(--accent); }
  .qty .count { min-width: 24px; text-align: center; font-weight: 600; }
  .cart-empty {
    text-align: center; color: var(--muted); padding: 30px 10px;
  }
  .cart-footer {
    border-top: 1px solid var(--border);
    padding: 12px;
    background: var(--surface);
  }
  .cart-total {
    display: flex; justify-content: space-between;
    font-size: 22px; font-weight: 700; margin-bottom: 12px;
  }
  .cart-actions { display: flex; gap: 8px; }
  .btn {
    flex: 1; min-height: 56px; border: none; border-radius: 12px;
    font-size: 17px; font-weight: 600; padding: 0 16px;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:active { background: var(--accent-press); }
  .btn-primary:disabled { background: var(--surface-2); color: var(--muted); }
  .btn-secondary { background: var(--surface-2); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:active { background: var(--border); }
  .btn-danger { background: var(--danger); color: white; }
  .btn-danger:active { opacity: 0.85; }

  /* Payment screen */
  #payment .pay-content {
    flex: 1; overflow-y: auto;
    padding: 20px; max-width: 480px; width: 100%;
    margin: 0 auto;
    min-height: 0;
    -webkit-overflow-scrolling: touch;
  }
  .pay-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
  }
  .pay-row .label { color: var(--muted); font-size: 16px; }
  .pay-row .value { font-size: 22px; font-weight: 600; }
  .pay-row.total .value { font-size: 28px; }
  .pay-row.change .value { color: var(--success); font-size: 32px; font-weight: 700; }
  .pay-row.change.negative .value { color: var(--danger); }
  .input-cash {
    width: 100%; background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 12px;
    padding: 16px; font-size: 24px; font-weight: 600;
    color: var(--text); text-align: right;
    margin-top: 6px;
  }
  .input-cash:focus { outline: none; border-color: var(--accent); }
  .quick-cash {
    display: grid; grid-template-columns: repeat(4, 1fr);
    gap: 8px; margin-top: 12px;
  }
  .quick-cash button {
    background: var(--surface-2); border: 1px solid var(--border);
    color: var(--text); border-radius: 10px;
    padding: 14px 4px; font-size: 15px; font-weight: 600;
    min-height: 52px;
  }
  .quick-cash button:active { background: var(--accent); }
  .pay-actions {
    display: flex; gap: 8px; padding: 16px;
    border-top: 1px solid var(--border);
  }

  /* Menu editor */
  #editor { padding: 12px; }
  #editor.active {
    display: block;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .editor-section {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; margin-bottom: 14px;
    overflow: hidden;
  }
  .editor-section h3 {
    margin: 0; padding: 14px 16px;
    font-size: 15px; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--muted);
    border-bottom: 1px solid var(--border);
  }
  .editor-list { padding: 6px 0; }
  .editor-row {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
  }
  .editor-row:last-child { border-bottom: none; }
  .editor-row .info { flex: 1; min-width: 0; }
  .editor-row .name { font-size: 16px; font-weight: 500; }
  .editor-row .price { font-size: 13px; color: var(--muted); }
  .editor-row .actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 44px; height: 44px;
    background: var(--surface-2); border: 1px solid var(--border);
    border-radius: 10px; font-size: 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .icon-btn:active { background: var(--accent); }
  .icon-btn.active { background: var(--accent); border-color: var(--accent); color: white; }
  .icon-btn.danger:active { background: var(--danger); border-color: var(--danger); }
  .editor-empty { padding: 20px 16px; color: var(--muted); text-align: center; font-size: 14px; }

  .add-form {
    display: flex; flex-direction: column; gap: 10px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
    background: var(--surface-2);
  }
  .add-form-inputs { display: flex; gap: 8px; }
  .add-form input {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; padding: 12px;
    color: var(--text); font-size: 16px; min-height: 48px;
  }
  .add-form input.name { flex: 1; min-width: 0; }
  .add-form input.price { width: 90px; text-align: right; }
  .add-form button {
    background: var(--accent); border: none; color: white;
    border-radius: 8px; padding: 0 16px; font-size: 16px;
    font-weight: 600; min-height: 48px; min-width: 56px;
  }
  .palette-row {
    display: flex; flex-wrap: wrap; gap: 14px;
    padding: 6px 0;
  }
  .swatch {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--border);
    padding: 0; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 16px; font-weight: 600;
    flex-shrink: 0;
  }
  .swatch.selected {
    outline: 3px solid var(--accent);
    outline-offset: 3px;
  }
  .swatch.default {
    background: var(--surface-2);
    color: var(--muted);
  }
  .modal-palette {
    display: flex; flex-wrap: wrap; gap: 10px;
    padding: 4px 0 16px 0;
  }
  .modal-palette .swatch { width: 44px; height: 44px; font-size: 18px; }
  .color-dot {
    width: 20px; height: 20px; border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface);
    flex-shrink: 0; margin-right: 10px;
  }
  .backup-actions {
    display: flex; flex-direction: column; gap: 8px;
    padding: 12px 16px;
  }
  .backup-actions .btn { width: 100%; }
  .hint {
    margin: 0; padding: 0 16px 14px 16px;
    color: var(--muted); font-size: 13px; line-height: 1.4;
  }

  /* Summary */
  #summary { padding: 12px; }
  #summary.active {
    display: block;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .summary-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 18px; margin-bottom: 14px;
  }
  .summary-card .label {
    font-size: 13px; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--muted);
  }
  .summary-card .big {
    font-size: 36px; font-weight: 700; margin-top: 4px;
  }
  .summary-actions {
    display: flex; gap: 8px; margin-bottom: 14px;
  }
  .order-row {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; margin-bottom: 8px;
  }
  .order-row .head {
    display: flex; justify-content: space-between; align-items: center;
    font-weight: 600; margin-bottom: 6px;
  }
  .order-row .order-right {
    display: flex; align-items: center; gap: 10px;
  }
  .order-row .order-right .icon-btn {
    width: 36px; height: 36px; font-size: 16px;
  }
  .order-row .items { font-size: 14px; color: var(--muted); line-height: 1.5; }

  /* Modal */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: none; align-items: center; justify-content: center;
    padding: 20px; z-index: 100;
  }
  .modal-backdrop.active { display: flex; }
  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 14px; padding: 22px;
    max-width: 360px; width: 100%;
  }
  .modal h3 { margin: 0 0 8px 0; font-size: 19px; }
  .modal p { margin: 0 0 18px 0; color: var(--muted); }
  .modal .modal-actions { display: flex; gap: 8px; }
  .modal-form {
    display: flex; flex-direction: column; gap: 8px;
    padding: 4px 0 16px 0;
  }
  .modal-form-input {
    background: var(--surface-2);
    border: 1px solid var(--border); border-radius: 10px;
    padding: 14px; font-size: 17px;
    color: var(--text); min-height: 48px;
  }
  .modal-form-input:focus { outline: none; border-color: var(--accent); }
  button.info {
    background: none; border: none; color: inherit;
    padding: 0; text-align: left; cursor: pointer;
    flex: 1; min-width: 0;
  }
  button.info:active { opacity: 0.6; }
</style>
</head>
<body>
<div id="app">
  <nav class="tabs">
    <button data-tab="register" class="active">Kasse</button>
    <button data-tab="editor">Menü</button>
    <button data-tab="summary">Tag</button>
  </nav>

  <main>
    <!-- REGISTER -->
    <section id="register" class="screen active">
      <div class="menu-grid" id="menuGrid"></div>
      <div class="cart">
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
          <div class="cart-total"><span>Summe</span><span id="cartTotal">0,00 €</span></div>
          <div class="cart-actions">
            <button class="btn btn-secondary" id="clearCart">Leeren</button>
            <button class="btn btn-primary" id="charge">Kassieren</button>
          </div>
        </div>
      </div>
    </section>

    <!-- PAYMENT -->
    <section id="payment" class="screen">
      <div class="pay-content">
        <div class="pay-row total"><span class="label">Zu zahlen</span><span class="value" id="payTotal">0,00 €</span></div>
        <div style="padding: 14px 0;">
          <div class="label" style="color: var(--muted); font-size: 16px;">Gegeben</div>
          <input class="input-cash" id="cashGiven" type="text" inputmode="decimal" placeholder="0,00">
          <div class="quick-cash" id="quickCash"></div>
        </div>
        <div class="pay-row change" id="changeRow"><span class="label">Rückgeld</span><span class="value" id="changeAmount">0,00 €</span></div>
      </div>
      <div class="pay-actions">
        <button class="btn btn-secondary" id="cancelPay">Abbrechen</button>
        <button class="btn btn-primary" id="confirmPay">Bestätigen</button>
      </div>
    </section>

    <!-- EDITOR -->
    <section id="editor" class="screen">
      <div class="editor-section">
        <h3>Aktives Menü (heute)</h3>
        <div class="editor-list" id="activeList"></div>
      </div>
      <div class="editor-section">
        <h3>Bibliothek</h3>
        <div class="editor-list" id="libraryList"></div>
        <form class="add-form" id="addForm">
          <div class="palette-row" id="newColor"></div>
          <div class="add-form-inputs">
            <input class="name" id="newName" type="text" placeholder="Name" required>
            <input class="price" id="newPrice" type="text" inputmode="decimal" placeholder="0,00" required>
            <button type="submit">+</button>
          </div>
        </form>
      </div>
      <div class="editor-section">
        <h3>Vorlagen</h3>
        <div class="backup-actions">
          <button class="btn btn-secondary" id="exportLib">Vorlage exportieren</button>
          <label class="btn btn-secondary" for="importLibFile">Vorlage laden</label>
          <input type="file" id="importLibFile" accept="application/json,.json" hidden>
        </div>
        <p class="hint">Speichert die komplette Bibliothek und das aktive Menü als Datei. Dient als Sicherung oder als fertige Vorlage für nächste Veranstaltungen.</p>
      </div>
    </section>

    <!-- SUMMARY -->
    <section id="summary" class="screen">
      <div class="summary-card">
        <div class="label">Tagesumsatz</div>
        <div class="big" id="dayTotal">0,00 €</div>
        <div class="label" style="margin-top: 10px;"><span id="orderCount">0</span> Bestellungen</div>
      </div>
      <div class="summary-actions">
        <button class="btn btn-secondary" id="exportCsv">CSV exportieren</button>
        <button class="btn btn-danger" id="clearDay">Tag zurücksetzen</button>
      </div>
      <div id="orderList"></div>
    </section>
  </main>
</div>

<div class="modal-backdrop" id="modal">
  <div class="modal">
    <h3 id="modalTitle"></h3>
    <p id="modalText"></p>
    <div class="modal-palette" id="modalPalette" hidden></div>
    <div class="modal-form" id="modalForm" hidden>
      <input class="modal-form-input" id="modalEditName" type="text" placeholder="Name">
      <input class="modal-form-input" id="modalEditPrice" type="text" inputmode="decimal" placeholder="0,00">
    </div>
    <input class="input-cash" id="modalInput" type="text" inputmode="decimal" placeholder="0,00" hidden>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="modalCancel">Abbrechen</button>
      <button class="btn btn-danger" id="modalConfirm">Bestätigen</button>
    </div>
  </div>
</div>

<script>
// @ts-check
'use strict';

/**
 * @typedef {{ id: string, name: string, price: number, color: string }} MenuItem
 * @typedef {MenuItem & { qty: number }} CartLine
 * @typedef {{ name: string, price: number, qty: number }} OrderLine
 * @typedef {{ id: string, time: string, items: OrderLine[], total: number }} Order
 */

/** Fixed palette for menu item colors. Empty string = default (no color). */
const COLORS = [
  { name: 'Standard', value: '' },
  { name: 'Rose',     value: '#e11d48' },
  { name: 'Orange',   value: '#ea580c' },
  { name: 'Amber',    value: '#d97706' },
  { name: 'Lime',     value: '#65a30d' },
  { name: 'Emerald',  value: '#059669' },
  { name: 'Cyan',     value: '#0891b2' },
  { name: 'Blue',     value: '#2563eb' },
  { name: 'Violet',   value: '#7c3aed' },
  { name: 'Pink',     value: '#db2777' },
];

/**
 * Get element by id, asserting non-null. Throws loudly if the id is wrong —
 * better than a silent null deref deep in a render.
 * @template {HTMLElement} T
 * @param {string} id
 * @returns {T}
 */
function byId(id) {
  const el = document.getElementById(id);
  if (!el) throw new Error(`#${id} missing`);
  return /** @type {T} */ (el);
}

const KEYS = {
  reusables: 'club-register-reusables',
  active: 'club-register-active',
  orders: 'club-register-orders',
};

/** @template T @param {string} key @param {T} fallback @returns {T} */
function load(key, fallback) {
  try {
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch { return fallback; }
}
/** @param {string} key @param {unknown} val */
function save(key, val) {
  localStorage.setItem(key, JSON.stringify(val));
}

const state = {
  /** @type {MenuItem[]} */ reusables: load(KEYS.reusables, /** @type {MenuItem[]} */ ([]))
    .map(r => ({ ...r, color: typeof r.color === 'string' ? r.color : '' })),
  /** @type {string[]}   */ active:    load(KEYS.active,    /** @type {string[]}   */ ([])),
  /** @type {Order[]}    */ orders:    load(KEYS.orders,    /** @type {Order[]}    */ ([])),
  /** @type {CartLine[]} */ cart:      [],
};
// Persist migration of any items that had no color field.
save(KEYS.reusables, state.reusables);

/** State for the "new item" form in the editor. */
let newItemColor = '';

function saveAll() {
  save(KEYS.reusables, state.reusables);
  save(KEYS.active, state.active);
  save(KEYS.orders, state.orders);
}

function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

/** @param {number} n */
function fmt(n) {
  return n.toFixed(2).replace('.', ',') + ' €';
}
/** @param {string} str @returns {number} NaN if unparseable */
function parseEur(str) {
  if (!str) return NaN;
  const cleaned = String(str).replace(/\s|€/g, '').replace(',', '.');
  return parseFloat(cleaned);
}

// ---- Tabs ----
document.querySelectorAll('nav.tabs button').forEach(btn => {
  btn.addEventListener('click', () => {
    const tab = /** @type {HTMLElement} */ (btn).dataset.tab;
    if (tab) showTab(tab);
  });
});

/** @param {string} tab */
function showTab(tab) {
  document.querySelectorAll('nav.tabs button').forEach(b => {
    const t = /** @type {HTMLElement} */ (b).dataset.tab;
    b.classList.toggle('active', t === tab);
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === tab));
  if (tab === 'summary') renderSummary();
  if (tab === 'editor') renderEditor();
  if (tab === 'register') renderRegister();
}

// ---- Register ----
function renderRegister() {
  const grid = byId('menuGrid');
  grid.innerHTML = '';

  state.active.forEach(id => {
    const item = state.reusables.find(r => r.id === id);
    if (!item) return;
    const btn = document.createElement('button');
    btn.className = 'menu-item';
    if (item.color) {
      btn.style.setProperty('--menu-bg', item.color);
      btn.style.setProperty('--menu-fg', 'white');
    }
    btn.innerHTML = `<div class="name">${escapeHtml(item.name)}</div><div class="price">${fmt(item.price)}</div>`;
    btn.addEventListener('click', () => addToCart(item));
    grid.appendChild(btn);
  });

  if (state.active.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'menu-empty';
    empty.textContent = 'Kein aktives Menü. Im Tab "Menü" Artikel hinzufügen.';
    grid.appendChild(empty);
  }

  // Custom amount tile — always last, always available
  const customBtn = document.createElement('button');
  customBtn.className = 'menu-item menu-item--custom';
  customBtn.innerHTML = '<div class="name">+ Sonstiges</div><div class="price">Freier Betrag</div>';
  customBtn.addEventListener('click', openCustomAmount);
  grid.appendChild(customBtn);

  renderCart();
}

function openCustomAmount() {
  priceInputModal('Freier Betrag', price => {
    state.cart.push({
      id: 'custom-' + uid(),
      name: 'Sonstiges',
      price,
      color: '',
      qty: 1,
    });
    renderCart();
  });
}

/** @param {MenuItem} item */
/** @param {MenuItem} item */
function addToCart(item) {
  const existing = state.cart.find(c => c.id === item.id);
  if (existing) existing.qty++;
  else state.cart.push({ ...item, qty: 1 });
  renderCart();
}

function renderCart() {
  const list = byId('cartItems');
  list.innerHTML = '';
  if (state.cart.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'cart-empty';
    empty.textContent = 'Warenkorb leer';
    list.appendChild(empty);
  } else {
    state.cart.forEach(c => {
      const row = document.createElement('div');
      row.className = 'cart-item';
      row.innerHTML = `
        <div class="info">
          <div class="name">${escapeHtml(c.name)}</div>
          <div class="line">${fmt(c.price)} · ${fmt(c.price * c.qty)}</div>
        </div>
        <div class="qty">
          <button data-act="dec">−</button>
          <span class="count">${c.qty}</span>
          <button data-act="inc">+</button>
        </div>`;
      row.querySelector('[data-act="inc"]')?.addEventListener('click', () => { c.qty++; renderCart(); });
      row.querySelector('[data-act="dec"]')?.addEventListener('click', () => {
        c.qty--;
        if (c.qty <= 0) state.cart = state.cart.filter(x => x !== c);
        renderCart();
      });
      list.appendChild(row);
    });
  }
  byId('cartTotal').textContent = fmt(cartTotal());
  /** @type {HTMLButtonElement} */ (byId('charge')).disabled = state.cart.length === 0;
}

function cartTotal() {
  return state.cart.reduce((s, c) => s + c.price * c.qty, 0);
}

byId('clearCart').addEventListener('click', () => {
  state.cart = [];
  renderCart();
});

byId('charge').addEventListener('click', () => {
  if (state.cart.length === 0) return;
  openPayment();
});

// ---- Payment ----
function openPayment() {
  showTab('payment');
  document.querySelectorAll('.screen').forEach(s => s.classList.toggle('active', s.id === 'payment'));
  byId('payTotal').textContent = fmt(cartTotal());
  const cash = /** @type {HTMLInputElement} */ (byId('cashGiven'));
  cash.value = '';
  updateChange();
  buildQuickCash();
  setTimeout(() => cash.focus(), 50);
}

function buildQuickCash() {
  const wrap = byId('quickCash');
  wrap.innerHTML = '';
  const total = cartTotal();
  const denoms = [5, 10, 20, 50];
  /** @type {Set<number>} */
  const suggestions = new Set();
  suggestions.add(Math.ceil(total));
  denoms.forEach(d => { if (d >= total) suggestions.add(d); });
  const sorted = [...suggestions].sort((a, b) => a - b).slice(0, 4);
  sorted.forEach(v => {
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = fmt(v);
    b.addEventListener('click', () => {
      /** @type {HTMLInputElement} */ (byId('cashGiven')).value = v.toFixed(2).replace('.', ',');
      updateChange();
    });
    wrap.appendChild(b);
  });
}

byId('cashGiven').addEventListener('input', updateChange);

function updateChange() {
  const total = cartTotal();
  const given = parseEur(/** @type {HTMLInputElement} */ (byId('cashGiven')).value);
  if (isNaN(given)) {
    byId('changeAmount').textContent = fmt(0);
    byId('changeRow').classList.remove('negative');
    return;
  }
  const change = given - total;
  byId('changeAmount').textContent = fmt(change);
  byId('changeRow').classList.toggle('negative', change < 0);
}

byId('cancelPay').addEventListener('click', () => showTab('register'));

byId('confirmPay').addEventListener('click', () => {
  /** @type {Order} */
  const order = {
    id: uid(),
    time: new Date().toISOString(),
    items: state.cart.map(c => ({ name: c.name, price: c.price, qty: c.qty })),
    total: cartTotal(),
  };
  state.orders.push(order);
  save(KEYS.orders, state.orders);
  state.cart = [];
  showTab('register');
});

// ---- Editor ----
function renderNewColorPicker() {
  const row = byId('newColor');
  row.innerHTML = '';
  COLORS.forEach(c => {
    const swatch = document.createElement('button');
    swatch.type = 'button';
    swatch.className = 'swatch' + (c.value ? '' : ' default') + (c.value === newItemColor ? ' selected' : '');
    if (c.value) swatch.style.background = c.value;
    if (!c.value) swatch.textContent = '–';
    swatch.title = c.name;
    swatch.addEventListener('click', () => {
      newItemColor = c.value;
      renderNewColorPicker();
    });
    row.appendChild(swatch);
  });
}

function renderEditor() {
  renderNewColorPicker();
  const activeEl = byId('activeList');
  const libEl = byId('libraryList');

  // Active
  activeEl.innerHTML = '';
  if (state.active.length === 0) {
    activeEl.innerHTML = '<div class="editor-empty">Tippe in der Bibliothek auf +, um Artikel hinzuzufügen.</div>';
  } else {
    state.active.forEach(id => {
      const item = state.reusables.find(r => r.id === id);
      if (!item) return;
      const row = document.createElement('div');
      row.className = 'editor-row';
      const dotStyle = item.color ? `background: ${item.color}` : '';
      row.innerHTML = `
        <span class="color-dot" style="${dotStyle}"></span>
        <div class="info">
          <div class="name">${escapeHtml(item.name)}</div>
          <div class="price">${fmt(item.price)}</div>
        </div>
        <div class="actions">
          <button class="icon-btn" data-remove>−</button>
        </div>`;
      row.querySelector('[data-remove]')?.addEventListener('click', () => {
        state.active = state.active.filter(x => x !== id);
        save(KEYS.active, state.active);
        renderEditor();
      });
      activeEl.appendChild(row);
    });
  }

  // Library
  libEl.innerHTML = '';
  if (state.reusables.length === 0) {
    libEl.innerHTML = '<div class="editor-empty">Noch keine Artikel. Unten hinzufügen.</div>';
  } else {
    state.reusables.forEach(item => {
      const inActive = state.active.includes(item.id);
      const row = document.createElement('div');
      row.className = 'editor-row';
      const dotStyle = item.color ? `background: ${item.color}` : '';
      row.innerHTML = `
        <span class="color-dot" style="${dotStyle}"></span>
        <button class="info" data-edit aria-label="Artikel bearbeiten">
          <div class="name">${escapeHtml(item.name)}</div>
          <div class="price">${fmt(item.price)}</div>
        </button>
        <div class="actions">
          <button class="icon-btn ${inActive ? 'active' : ''}" data-toggle>${inActive ? '✓' : '+'}</button>
          <button class="icon-btn danger" data-delete>×</button>
        </div>`;
      row.querySelector('[data-edit]')?.addEventListener('click', () => {
        editItemModal(item, (name, price, color) => {
          item.name = name;
          item.price = price;
          item.color = color;
          save(KEYS.reusables, state.reusables);
          renderEditor();
        });
      });
      row.querySelector('[data-toggle]')?.addEventListener('click', () => {
        if (inActive) state.active = state.active.filter(x => x !== item.id);
        else state.active.push(item.id);
        save(KEYS.active, state.active);
        renderEditor();
      });
      row.querySelector('[data-delete]')?.addEventListener('click', () => {
        confirmModal('Artikel löschen?', `"${item.name}" wird aus der Bibliothek entfernt.`, () => {
          state.reusables = state.reusables.filter(r => r.id !== item.id);
          state.active = state.active.filter(x => x !== item.id);
          saveAll();
          renderEditor();
        });
      });
      libEl.appendChild(row);
    });
  }
}

byId('addForm').addEventListener('submit', e => {
  e.preventDefault();
  const nameEl = /** @type {HTMLInputElement} */ (byId('newName'));
  const priceEl = /** @type {HTMLInputElement} */ (byId('newPrice'));
  const name = nameEl.value.trim();
  const price = parseEur(priceEl.value);
  if (!name || isNaN(price) || price < 0) return;
  state.reusables.push({ id: uid(), name, price, color: newItemColor });
  save(KEYS.reusables, state.reusables);
  nameEl.value = '';
  priceEl.value = '';
  newItemColor = '';
  renderEditor();
});

// ---- Vorlagen (Export / Import) ----
/**
 * @typedef {{
 *   version: 1,
 *   reusables: MenuItem[],
 *   active: string[]
 * }} Template
 */

byId('exportLib').addEventListener('click', () => {
  /** @type {Template} */
  const template = {
    version: 1,
    reusables: state.reusables,
    active: state.active,
  };
  const json = JSON.stringify(template, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `vorlage-${stamp}.json`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
});

/** @param {unknown} x @returns {x is string} */
const isString = x => typeof x === 'string';

/** @param {unknown} x @returns {x is Record<string, unknown>} */
const isRecord = x => typeof x === 'object' && x !== null;

/**
 * @param {unknown} d
 * @returns {d is { id: string, name: string, price: number }}
 */
function isRawMenuItem(d) {
  return isRecord(d)
    && isString(d.id)
    && isString(d.name)
    && typeof d.price === 'number';
}

/**
 * Coerce a validated raw item into a full MenuItem by normalising the
 * optional color field. Accepts items with any extra keys.
 * @param {{ id: string, name: string, price: number, color?: unknown }} raw
 * @returns {MenuItem}
 */
function toMenuItem(raw) {
  return {
    id: raw.id,
    name: raw.name,
    price: raw.price,
    color: isString(raw.color) ? raw.color : '',
  };
}

/**
 * Parse an imported file. Accepts both the new template envelope
 * ({version, reusables, active}) and the old flat-array library
 * format for backward compat with previously exported files.
 * @param {unknown} data
 * @returns {{ reusables: MenuItem[], active: string[] } | null}
 */
function parseTemplate(data) {
  // Old format: flat array of items — active menu is unknown, default to empty.
  if (Array.isArray(data)) {
    if (!data.every(isRawMenuItem)) return null;
    return { reusables: data.map(toMenuItem), active: [] };
  }
  // New format: versioned envelope.
  if (!isRecord(data)) return null;
  if (!Array.isArray(data.reusables) || !data.reusables.every(isRawMenuItem)) return null;
  const reusables = data.reusables.map(toMenuItem);
  const known = new Set(reusables.map(r => r.id));
  const active = Array.isArray(data.active)
    ? data.active.filter(isString).filter(id => known.has(id))
    : [];
  return { reusables, active };
}

const importEl = /** @type {HTMLInputElement} */ (byId('importLibFile'));
importEl.addEventListener('change', async () => {
  const file = importEl.files && importEl.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const parsed = parseTemplate(JSON.parse(text));
    if (!parsed) throw new Error('Format ungültig');
    confirmModal(
      'Vorlage laden?',
      `${parsed.reusables.length} Artikel · ${parsed.active.length} im aktiven Menü. Die aktuelle Bibliothek und das aktive Menü werden ersetzt.`,
      () => {
        state.reusables = parsed.reusables;
        state.active = parsed.active;
        saveAll();
        renderEditor();
      },
    );
  } catch (err) {
    alert('Datei konnte nicht gelesen werden: ' + (err instanceof Error ? err.message : 'Unbekannter Fehler'));
  }
  importEl.value = '';
});

// ---- Summary ----
function renderSummary() {
  const total = state.orders.reduce((s, o) => s + o.total, 0);
  byId('dayTotal').textContent = fmt(total);
  byId('orderCount').textContent = String(state.orders.length);

  const list = byId('orderList');
  list.innerHTML = '';
  [...state.orders].reverse().forEach(o => {
    const time = formatTime(o.time);
    const row = document.createElement('div');
    row.className = 'order-row';
    const itemsText = o.items.map(i => `${i.qty}× ${i.name}`).join(', ');
    row.innerHTML = `
      <div class="head">
        <span>${time}</span>
        <span class="order-right">
          <span>${fmt(o.total)}</span>
          <button class="icon-btn danger" data-delete aria-label="Bestellung löschen">×</button>
        </span>
      </div>
      <div class="items">${escapeHtml(itemsText)}</div>`;
    row.querySelector('[data-delete]')?.addEventListener('click', () => {
      confirmModal(
        'Bestellung löschen?',
        `${time} · ${fmt(o.total)} — diese Bestellung wird aus dem heutigen Tag entfernt.`,
        () => {
          state.orders = state.orders.filter(x => x.id !== o.id);
          save(KEYS.orders, state.orders);
          renderSummary();
        },
      );
    });
    list.appendChild(row);
  });
}

/** @param {string} iso */
function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
}

byId('exportCsv').addEventListener('click', exportCsv);
byId('clearDay').addEventListener('click', () => {
  if (state.orders.length === 0 && state.active.length === 0) return;
  confirmModal('Tag zurücksetzen?', 'Alle Bestellungen und das aktive Menü werden gelöscht. Die Bibliothek bleibt erhalten.', () => {
    state.orders = [];
    state.active = [];
    state.cart = [];
    saveAll();
    renderSummary();
  });
});

function exportCsv() {
  // Semicolon-separated for EU locale Excel/Numbers
  const sep = ';';
  /** @type {(string | number)[][]} */
  const rows = [['Zeit', 'Artikel', 'Anzahl', 'Einzelpreis', 'Zwischensumme']];
  let dayTotal = 0;
  state.orders.forEach(o => {
    const time = formatTime(o.time);
    o.items.forEach(i => {
      rows.push([time, i.name, i.qty, csvNum(i.price), csvNum(i.price * i.qty)]);
    });
    rows.push([time, 'BESTELLSUMME', '', '', csvNum(o.total)]);
    dayTotal += o.total;
  });
  rows.push(['TAGESSUMME', '', '', '', csvNum(dayTotal)]);

  const csv = rows.map(r => r.map(csvCell).join(sep)).join('\r\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const stamp = new Date().toISOString().slice(0, 10);
  a.href = url;
  a.download = `kasse-${stamp}.csv`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

/** @param {number} n */
function csvNum(n) { return n.toFixed(2).replace('.', ','); }

/** @param {string | number} v */
function csvCell(v) {
  const s = String(v);
  if (/[";\r\n]/.test(s)) return '"' + s.replace(/"/g, '""') + '"';
  return s;
}

// ---- Modal ----
/** @type {(() => void) | null} */
let modalCb = null;

/**
 * Reset all modal sub-elements to their default (hidden) state and
 * restore the confirm button to the destructive variant. Every modal
 * helper calls this before configuring what it needs.
 */
function resetModal() {
  byId('modalText').textContent = '';
  byId('modalPalette').hidden = true;
  byId('modalForm').hidden = true;
  /** @type {HTMLInputElement} */ (byId('modalInput')).hidden = true;
  const confirmBtn = /** @type {HTMLElement} */ (byId('modalConfirm'));
  confirmBtn.hidden = false;
  confirmBtn.classList.remove('btn-primary');
  confirmBtn.classList.add('btn-danger');
  modalCb = null;
}

function closeModal() {
  byId('modal').classList.remove('active');
  resetModal();
}

/** Switch the confirm button to the non-destructive (blue) style. */
function useSaveButton() {
  const confirmBtn = /** @type {HTMLElement} */ (byId('modalConfirm'));
  confirmBtn.classList.remove('btn-danger');
  confirmBtn.classList.add('btn-primary');
}

/** @param {string} title @param {string} text @param {() => void} cb */
function confirmModal(title, text, cb) {
  resetModal();
  byId('modalTitle').textContent = title;
  byId('modalText').textContent = text;
  modalCb = cb;
  byId('modal').classList.add('active');
}

/** @param {string} title @param {(price: number) => void} cb */
function priceInputModal(title, cb) {
  resetModal();
  byId('modalTitle').textContent = title;
  const input = /** @type {HTMLInputElement} */ (byId('modalInput'));
  input.hidden = false;
  input.value = '';
  useSaveButton();
  modalCb = () => {
    const price = parseEur(input.value);
    if (!isNaN(price) && price > 0) cb(price);
  };
  byId('modal').classList.add('active');
  setTimeout(() => input.focus(), 50);
}

/**
 * @param {MenuItem} item
 * @param {(name: string, price: number, color: string) => void} cb
 */
function editItemModal(item, cb) {
  resetModal();
  byId('modalTitle').textContent = 'Artikel bearbeiten';
  byId('modalForm').hidden = false;
  const nameIn = /** @type {HTMLInputElement} */ (byId('modalEditName'));
  const priceIn = /** @type {HTMLInputElement} */ (byId('modalEditPrice'));
  nameIn.value = item.name;
  priceIn.value = item.price.toFixed(2).replace('.', ',');

  // Inline color picker — tracks a local selection and updates the palette visuals.
  let pickedColor = item.color;
  const palette = byId('modalPalette');
  palette.hidden = false;
  const renderPalette = () => {
    palette.innerHTML = '';
    COLORS.forEach(c => {
      const swatch = document.createElement('button');
      swatch.type = 'button';
      swatch.className = 'swatch' + (c.value ? '' : ' default') + (c.value === pickedColor ? ' selected' : '');
      if (c.value) swatch.style.background = c.value;
      if (!c.value) swatch.textContent = '–';
      swatch.title = c.name;
      swatch.addEventListener('click', () => {
        pickedColor = c.value;
        renderPalette();
      });
      palette.appendChild(swatch);
    });
  };
  renderPalette();

  useSaveButton();
  modalCb = () => {
    const name = nameIn.value.trim();
    const price = parseEur(priceIn.value);
    if (!name || isNaN(price) || price < 0) return;
    cb(name, price, pickedColor);
  };
  byId('modal').classList.add('active');
  setTimeout(() => nameIn.focus(), 50);
}

byId('modalCancel').addEventListener('click', closeModal);
byId('modalConfirm').addEventListener('click', () => {
  const cb = modalCb;
  closeModal();
  if (cb) cb();
});

// ---- Helpers ----
/** @param {string} s */
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// ---- Service Worker (für Offline-Betrieb) ----
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => { /* ignored on file:// */ });
  });
}

// ---- Init ----
renderRegister();
</script>
