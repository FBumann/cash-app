name: Tag release

on:
  push:
    branches: [main]
    paths:
      - index.html
      - .github/workflows/release.yml

jobs:
  tag:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract APP_VERSION from index.html
        id: ver
        run: |
          v=$(grep -E "const APP_VERSION" index.html | head -1 | sed -E "s/.*'([^']+)'.*/\1/")
          if [ -z "$v" ]; then
            echo "Could not find APP_VERSION in index.html" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check
        run: |
          if git rev-parse "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release notes from commit messages
        if: steps.check.outputs.exists == 'false'
        id: notes
        run: |
          prev=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)
          if [ -n "$prev" ]; then
            range="$prev..HEAD"
            header="### Änderungen seit $prev"
          else
            range=""
            header="### Änderungen"
          fi
          {
            echo "$header"
            echo
            git log $range --pretty=format:"- %s (%h)" --no-merges
            echo
            if [ -n "$prev" ]; then
              echo
              echo "**Full Changelog:** https://github.com/${{ github.repository }}/compare/$prev...${{ steps.ver.outputs.tag }}"
            fi
          } > release-notes.md

      - name: Create tag and GitHub release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"
          gh release create "${{ steps.ver.outputs.tag }}" \
            --title "${{ steps.ver.outputs.tag }}" \
            --notes-file release-notes.md

      - name: Deploy to gh-pages branch
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.ver.outputs.tag }}"
          repo_url="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          tmp=$(mktemp -d)

          # Clone gh-pages if it exists, otherwise init an orphan branch.
          if git ls-remote --exit-code --heads "$repo_url" gh-pages >/dev/null 2>&1; then
            git clone --branch gh-pages --single-branch "$repo_url" "$tmp"
          else
            git clone "$repo_url" "$tmp"
            (
              cd "$tmp"
              git checkout --orphan gh-pages
              git rm -rf . 2>/dev/null || true
            )
          fi

          # Latest copy lives at the root of gh-pages.
          cp index.html sw.js "$tmp/"
          # Archive this version for rollback installs.
          mkdir -p "$tmp/versions/$tag"
          cp index.html sw.js "$tmp/versions/$tag/"

          cd "$tmp"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "gh-pages already up to date"
          else
            git commit -m "Deploy $tag [skip ci]"
            git push origin gh-pages
          fi
